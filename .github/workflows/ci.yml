name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: e-commerce-backend
  ECR_REPOSITORY_FRONTEND: e-commerce-frontend

jobs:
  # Stage 1: Lint and Test
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      - name: Lint Python code
        run: |
          cd backend
          flake8 app/ --max-line-length=120 --exclude=__pycache__,migrations
          black --check app/
      
      - name: Run unit tests
        run: |
          cd backend
          pytest tests/ --cov=app --cov-report=xml || true

  # Stage 2: Build and Push to ECR
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push backend image
        run: |
          cd backend
          docker build -t ${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }} .
          docker tag ${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }} --all-tags
      
      - name: Build and push frontend image
        run: |
          cd frontend
          docker build -t ${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }} .
          docker tag ${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }} --all-tags

  # Stage 3: Deploy to Staging  ← THIS IS THE JOB YOU ASKED ABOUT
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name devops-enterprise-cluster
      
      - name: Create namespace
        run: |
          kubectl create namespace ecommerce --dry-run=client -o yaml | kubectl apply -f -
      
      - name: Deploy Backend to EKS
        run: |
          # Update image in deployment file
          sed -i "s|your-ecr-repo/e-commerce-backend:latest|${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}|g" k8s-manifests/deployment.yaml
          
          # Apply deployment
          kubectl apply -f k8s-manifests/deployment.yaml -n ecommerce
          
          # Wait for rollout
          kubectl rollout status deployment/backend-api -n ecommerce --timeout=5m
      
      - name: Deploy Frontend to EKS
        run: |
          sed -i "s|your-ecr-repo/e-commerce-frontend:latest|${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}|g" k8s-manifests/frontend-deployment.yaml
          kubectl apply -f k8s-manifests/frontend-deployment.yaml -n ecommerce
          kubectl rollout status deployment/frontend -n ecommerce --timeout=5m
      
      - name: Get Service URLs
        run: |
          kubectl get svc -n ecommerce