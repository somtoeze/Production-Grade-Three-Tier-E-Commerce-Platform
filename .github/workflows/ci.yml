name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: ecommerce-backend
  ECR_REPOSITORY_FRONTEND: ecommerce-frontend

jobs:
  # Stage 1: Lint and Test
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      - name: Lint Python code
        run: |
          cd backend
          flake8 src/ --max-line-length=120
          black --check src/
      
      - name: Run unit tests with coverage
        run: |
          cd backend
          pytest tests/unit/ --cov=src --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
  
  # Stage 2: Build and Scan (Security)
  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image for scanning
        run: |
          cd backend
          docker build -t e-commerce-backend .
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: e-commerce-backend
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  
  # Stage 3: Build and Push to ECR
  build-and-push:
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push backend image
        run: |
          cd backend
          docker build -t ${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }} .
          docker tag ${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }} --all-tags
      
      - name: Build and push frontend image
        run: |
          cd frontend
          docker build -t ${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }} .
          docker tag ${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }} --all-tags
  
  # Stage 4: Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ecommerce-cluster \
            --service backend-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
      
      - name: Run smoke tests
        run: |
          ./scripts/smoke-test.sh ${{ secrets.STAGING_URL }}
      
      - name: Run load test (k6)
        run: |
          cd scripts
          K6_CLOUD_TOKEN=${{ secrets.K6_CLOUD_TOKEN }} \
          k6 cloud load-test.js \
            --env BASE_URL=${{ secrets.STAGING_URL }}
  
  # Stage 5: Deploy to Production (Manual Approval)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Blue/Green deployment
        run: |
          aws deploy create-deployment \
            --application-name ecommerce-app \
            --deployment-group-name production-group \
            --deployment-config-name CodeDeployDefault.ECSAllAtOnce